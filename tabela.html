<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Periódica Completa - 118 Elementos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --metal-alcalino: #FF6B6B;
            --metal-alcalino-terroso: #FFD166;
            --metal-transicao: #06D6A0;
            --metal-pos-transicao: #118AB2;
            --semimetal: #073B4C;
            --nao-metal: #EF476F;
            --halogenio: #7209B7;
            --gas-nobre: #3A86FF;
            --lantanideo: #8338EC;
            --actinideo: #FB5607;
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 10px;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(58, 134, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(239, 71, 111, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(6, 214, 160, 0.05) 0%, transparent 30%);
            animation: backgroundShift 20s ease-in-out infinite alternate;
        }

        @keyframes backgroundShift {
            0% {
                background-position: 0% 0%, 100% 100%, 50% 50%;
            }
            100% {
                background-position: 10% 20%, 90% 80%, 60% 60%;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--metal-alcalino), var(--gas-nobre), var(--metal-transicao), transparent);
            animation: headerGlow 3s ease-in-out infinite alternate;
        }

        @keyframes headerGlow {
            0% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }

        h1 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(58, 134, 255, 0.8), 0 0 30px rgba(58, 134, 255, 0.6);
            }
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 0 5px;
        }

        .search-container {
            display: flex;
            max-width: 100%;
            width: 100%;
            position: relative;
        }

        #search {
            padding: 12px 15px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px 0 0 8px;
            font-size: 16px;
            min-height: 48px;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        #search:focus {
            outline: none;
            border-color: var(--gas-nobre);
            box-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.15);
        }

        #search-btn {
            padding: 12px 15px;
            background: linear-gradient(135deg, var(--gas-nobre), #2a5fc5);
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            min-width: 60px;
            min-height: 48px;
            transition: all 0.3s ease;
        }

        #search-btn:hover {
            background: linear-gradient(135deg, #2a5fc5, var(--gas-nobre));
            box-shadow: 0 0 15px rgba(58, 134, 255, 0.7);
            transform: translateY(-2px);
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .filter-btn {
            padding: 10px 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            min-height: 44px;
            flex: 1;
            min-width: 120px;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .filter-btn:hover::before {
            left: 100%;
        }

        .filter-btn.active {
            background-color: var(--gas-nobre);
            color: white;
            box-shadow: 0 0 10px rgba(58, 134, 255, 0.7);
            border-color: var(--gas-nobre);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
            padding: 0 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 4px;
            color: white;
            min-height: 32px;
            transition: transform 0.3s ease;
        }

        .legend-item:hover {
            transform: translateY(-3px);
        }

        .periodic-table-container {
            overflow-x: auto;
            margin: 15px 0;
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .periodic-table-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            padding: 2px;
            background: linear-gradient(135deg, var(--metal-alcalino), var(--gas-nobre), var(--metal-transicao));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            animation: borderRotate 10s linear infinite;
            pointer-events: none;
        }

        @keyframes borderRotate {
            0% {
                background: linear-gradient(135deg, var(--metal-alcalino), var(--gas-nobre), var(--metal-transicao));
            }
            25% {
                background: linear-gradient(135deg, var(--gas-nobre), var(--metal-transicao), var(--metal-alcalino));
            }
            50% {
                background: linear-gradient(135deg, var(--metal-transicao), var(--metal-alcalino), var(--gas-nobre));
            }
            75% {
                background: linear-gradient(135deg, var(--metal-alcalino), var(--metal-transicao), var(--gas-nobre));
            }
            100% {
                background: linear-gradient(135deg, var(--metal-alcalino), var(--gas-nobre), var(--metal-transicao));
            }
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(40px, 1fr));
            grid-gap: 4px;
            margin: 0 auto;
            min-width: 800px;
        }

        .element {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px;
            color: white;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            min-height: 40px;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            opacity: 1;
            transform: translateY(0);
        }

        .element::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .element:hover, .element:focus {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .element:hover::before {
            opacity: 1;
        }

        .element.hidden {
            opacity: 0.3;
            transform: scale(0.9);
        }

        .element-number {
            font-size: 10px;
            align-self: flex-start;
            line-height: 1;
        }

        .element-symbol {
            font-size: 16px;
            font-weight: bold;
            margin: 2px 0;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            line-height: 1;
        }

        .element-name {
            font-size: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
            line-height: 1.1;
            max-height: 16px;
        }

        .empty {
            background-color: transparent;
            border: none;
            box-shadow: none;
            cursor: default;
        }

        .empty:hover {
            transform: none;
            box-shadow: none;
        }

        /* Cores por categoria */
        .metal-alcalino { 
            background-color: var(--metal-alcalino);
        }
        .metal-alcalino-terroso { 
            background-color: var(--metal-alcalino-terroso);
        }
        .metal-transicao { 
            background-color: var(--metal-transicao);
        }
        .metal-pos-transicao { 
            background-color: var(--metal-pos-transicao);
        }
        .semimetal { 
            background-color: var(--semimetal);
        }
        .nao-metal { 
            background-color: var(--nao-metal);
        }
        .halogenio { 
            background-color: var(--halogenio);
        }
        .gas-nobre { 
            background-color: var(--gas-nobre);
        }
        .lantanideo { 
            background-color: var(--lantanideo);
        }
        .actinideo { 
            background-color: var(--actinideo);
        }

        .lanthanides-actinides {
            margin-top: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .lanthanides-actinides::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            padding: 2px;
            background: linear-gradient(135deg, var(--lantanideo), var(--actinideo));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            animation: borderRotate2 8s linear infinite;
            pointer-events: none;
        }

        @keyframes borderRotate2 {
            0% {
                background: linear-gradient(135deg, var(--lantanideo), var(--actinideo));
            }
            50% {
                background: linear-gradient(135deg, var(--actinideo), var(--lantanideo));
            }
            100% {
                background: linear-gradient(135deg, var(--lantanideo), var(--actinideo));
            }
        }

        .lanthanides-actinides h3 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            text-shadow: 0 0 10px rgba(131, 56, 236, 0.5);
        }

        .lanthanides, .actinides {
            display: grid;
            grid-template-columns: repeat(15, minmax(40px, 1fr));
            grid-gap: 4px;
            margin-bottom: 20px;
            min-width: 700px;
        }

        /* Modal de informações */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 10px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-secondary), #2a2a2a);
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 50px rgba(58, 134, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0.8);
            opacity: 0;
        }

        @keyframes modalAppear {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #ccc;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .element-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .element-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .element-large {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .element-large::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .element-large .symbol {
            font-size: 32px;
            z-index: 1;
        }

        .element-large .number {
            font-size: 14px;
            align-self: flex-start;
            margin-left: 5px;
            z-index: 1;
        }

        .element-large .name {
            font-size: 12px;
            z-index: 1;
        }

        .element-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .detail-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .detail-label {
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-value {
            font-size: 16px;
            color: var(--text-primary);
        }

        .element-description {
            margin-top: 10px;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            .periodic-table {
                grid-template-columns: repeat(18, minmax(35px, 1fr));
            }
            
            .element-symbol {
                font-size: 14px;
            }
            
            .lanthanides, .actinides {
                grid-template-columns: repeat(15, minmax(35px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .periodic-table {
                grid-template-columns: repeat(18, minmax(30px, 1fr));
            }
            
            .element-symbol {
                font-size: 12px;
            }
            
            .element-name {
                font-size: 7px;
            }
            
            .element-details {
                grid-template-columns: 1fr;
            }
            
            .lanthanides, .actinides {
                grid-template-columns: repeat(8, minmax(35px, 1fr));
            }
            
            .element-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .modal-content {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .periodic-table {
                grid-template-columns: repeat(18, minmax(25px, 1fr));
                min-width: 500px;
            }
            
            .element-symbol {
                font-size: 10px;
            }
            
            .element-number {
                font-size: 8px;
            }
            
            .element-name {
                font-size: 6px;
            }
            
            .lanthanides, .actinides {
                grid-template-columns: repeat(5, minmax(30px, 1fr));
                min-width: 200px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .search-container {
                max-width: 100%;
            }
            
            .filter-btn {
                min-width: 100px;
                font-size: 12px;
                padding: 8px 10px;
            }
            
            .legend-item {
                font-size: 10px;
                padding: 5px 8px;
            }
            
            .element-large {
                width: 70px;
                height: 70px;
            }
            
            .element-large .symbol {
                font-size: 26px;
            }
        }

        @media (max-width: 360px) {
            .periodic-table {
                grid-template-columns: repeat(18, minmax(22px, 1fr));
            }
            
            .element-symbol {
                font-size: 9px;
            }
            
            .element-name {
                font-size: 5px;
            }
        }

        /* Animações extras */
        .floating {
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            }
        }

        /* Efeito de partículas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }

        /* Elementos aparecendo com animação */
        .element-animated {
            animation: elementAppear 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes elementAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Áudio oculto */
        .audio-container {
            display: none;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <!-- Áudios para efeitos sonoros -->
    <div class="audio-container">
        <audio id="hover-sound" preload="auto">
            <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3" type="audio/mpeg">
        </audio>
        <audio id="click-sound" preload="auto">
            <source src="https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3127.mp3" type="audio/mpeg">
        </audio>
        <audio id="modal-sound" preload="auto">
            <source src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <div class="container">
        <header>
            <h1 class="floating">Tabela Periódica Completa</h1>
            <p class="subtitle">Todos os 118 elementos - Clique para ver informações detalhadas</p>
        </header>

        <div class="controls">
            <div class="search-container">
                <input type="text" id="search" placeholder="Pesquisar elemento..." aria-label="Pesquisar elemento">
                <button id="search-btn" aria-label="Buscar"><i class="fas fa-search"></i></button>
            </div>
            <div class="filter-container">
                <button class="filter-btn active" data-category="all">Todos</button>
                <button class="filter-btn" data-category="metal-alcalino">Metais Alcalinos</button>
                <button class="filter-btn" data-category="metal-alcalino-terroso">Alcalino-Terrosos</button>
                <button class="filter-btn" data-category="metal-transicao">Metais de Transição</button>
                <button class="filter-btn" data-category="nao-metal">Não Metais</button>
                <button class="filter-btn" data-category="gas-nobre">Gases Nobres</button>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item metal-alcalino">Metais Alcalinos</div>
            <div class="legend-item metal-alcalino-terroso">Metais Alcalino-Terrosos</div>
            <div class="legend-item metal-transicao">Metais de Transição</div>
            <div class="legend-item metal-pos-transicao">Metais Pós-Transição</div>
            <div class="legend-item semimetal">Semimetais</div>
            <div class="legend-item nao-metal">Não Metais</div>
            <div class="legend-item halogenio">Halogênios</div>
            <div class="legend-item gas-nobre">Gases Nobres</div>
            <div class="legend-item lantanideo">Lantanídeos</div>
            <div class="legend-item actinideo">Actinídeos</div>
        </div>

        // Função para criar partículas de fundo
        function criarParticulas() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Posição aleatória
                const left = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = 15 + Math.random() * 10;
                
                particle.style.left = `${left}%`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                // Tamanho aleatório
                const size = 2 + Math.random() * 3;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Cor aleatória baseada nas categorias
                const colors = [
                    'rgba(255, 107, 107, 0.7)',   // metal-alcalino
                    'rgba(255, 209, 102, 0.7)',   // metal-alcalino-terroso
                    'rgba(6, 214, 160, 0.7)',     // metal-transicao
                    'rgba(58, 134, 255, 0.7)',    // gas-nobre
                    'rgba(239, 71, 111, 0.7)',    // nao-metal
                    'rgba(131, 56, 236, 0.7)'     // lantanideo
                ];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = color;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Função para criar a tabela periódica
        function criarTabelaPeriodica() {
            const tabela = document.getElementById('periodic-table');
            tabela.innerHTML = '';
            
            // Para cada período (linha) de 1 a 7
            for (let periodo = 1; periodo <= 7; periodo++) {
                // Para cada grupo (coluna) de 1 a 18
                for (let grupo = 1; grupo <= 18; grupo++) {
                    // Verificar se esta posição é vazia
                    const ehVazia = posicoesVazias.some(pos => pos.grupo === grupo && pos.periodo === periodo);
                    
                    if (ehVazia) {
                        const elementoVazio = document.createElement('div');
                        elementoVazio.className = 'element empty';
                        elementoVazio.setAttribute('aria-hidden', 'true');
                        tabela.appendChild(elementoVazio);
                        continue;
                    }
                    
                    // Encontrar o elemento nesta posição
                    const elemento = elementos.find(el => el.grupo === grupo && el.periodo === periodo);
                    
                    if (elemento) {
                        const elementoDiv = document.createElement('div');
                        elementoDiv.className = `element ${elemento.categoria}`;
                        elementoDiv.innerHTML = `
                            <div class="element-number">${elemento.numero}</div>
                            <div class="element-symbol">${elemento.simbolo}</div>
                            <div class="element-name">${elemento.nome}</div>
                        `;
                        elementoDiv.setAttribute('role', 'gridcell');
                        elementoDiv.setAttribute('tabindex', '0');
                        elementoDiv.setAttribute('aria-label', `${elemento.nome}, número atômico ${elemento.numero}`);
                        
                        // Adicionar efeitos sonoros
                        elementoDiv.addEventListener('mouseenter', tocarSomHover);
                        elementoDiv.addEventListener('click', () => {
                            tocarSomClique();
                            mostrarInformacoes(elemento);
                        });
                        elementoDiv.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                tocarSomClique();
                                mostrarInformacoes(elemento);
                            }
                        });
                        tabela.appendChild(elementoDiv);
                    } else {
                        const elementoVazio = document.createElement('div');
                        elementoVazio.className = 'element empty';
                        elementoVazio.setAttribute('aria-hidden', 'true');
                        tabela.appendChild(elementoVazio);
                    }
                }
            }
            
            // Adicionar lantanídeos e actinídeos
            criarLantanideosActinideos();
        }

                'metal-transicao': 'Metal de Transição',

                'semimetal': 'Semimetal',
                'nao-metal': 'Não Metal',
                'halogenio': 'Halogênio',
                'gas-nobre': 'Gás Nobre',
                'lantanideo': 'Lantanídeo',
                'actinideo': 'Actinídeo'

            return categorias[categoria] || categoria;

                // Adicionar efeitos sonoros

                    mostrarInformacoes(elemento);
                });
                elementoDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        tocarSomClique();
                        mostrarInformacoes(elemento);
                    }
                });
                tabela.appendChild(elementoDiv);
            });
        }

        // Função para filtrar por categoria
        function filtrarPorCategoria(categoria) {
            const todosElementos = document.querySelectorAll('.element:not(.empty)');
            
            todosElementos.forEach(elemento => {
                if (categoria === 'all' || elemento.classList.contains(categoria)) {
                    elemento.classList.remove('hidden');
                } else {
                    elemento.classList.add('hidden');
                }
            });
        }

        // Funções para efeitos sonoros
        function tocarSomHover() {
            const som = document.getElementById('hover-sound');
            som.currentTime = 0;
            som.volume = 0.3;
            som.play().catch(e => console.log("Erro ao reproduzir som de hover: ", e));
        }

        function tocarSomClique() {
            const som = document.getElementById('click-sound');
            som.currentTime = 0;
            som.volume = 0.5;
            som.play().catch(e => console.log("Erro ao reproduzir som de clique: ", e));
        }

        function tocarSomModal() {
            const som = document.getElementById('modal-sound');
            som.currentTime = 0;
            som.volume = 0.4;
            som.play().catch(e => console.log("Erro ao reproduzir som do modal: ", e));
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            criarParticulas();
            criarTabelaPeriodica();
            
            // Event listeners
            document.getElementById('close-modal').addEventListener('click', function() {
                document.getElementById('element-modal').style.display = 'none';
                document.body.style.overflow = 'auto';
                tocarSomClique();
            });
            
            document.getElementById('close-modal').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    document.getElementById('element-modal').style.display = 'none';
                    document.body.style.overflow = 'auto';
                    tocarSomClique();
                }
            });
            
            document.getElementById('search').addEventListener('input', filtrarElementos);
            document.getElementById('search-btn').addEventListener('click', () => {
                filtrarElementos();
                tocarSomClique();
            });
            
            // Permitir busca com Enter
            document.getElementById('search').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    filtrarElementos();
                    tocarSomClique();
                }
            });
            
            // Fechar modal ao clicar fora
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('element-modal');
                if (event.target === modal) {
                    modal.style.display = 'none';
                    document.body.style.overflow = 'auto';
                    tocarSomClique();
                }
            });
            
            // Fechar modal com ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('element-modal').style.display = 'none';
                    document.body.style.overflow = 'auto';
                    tocarSomClique();
                }
            });
            
            // Filtros por categoria
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filtrarPorCategoria(this.dataset.category);
                    tocarSomClique();
                });
                
                // Permitir ativação com Enter
                btn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        filtrarPorCategoria(this.dataset.category);
                        tocarSomClique();
                    }
                });
            });
        });
    </script>
</body>
</html>
